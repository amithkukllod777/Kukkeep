name: kukkeep
description: KukKeep — native notes, checklists & reminders (Flutter). Connects to your KukLabs account.
publish_to: 'none'
version: 2.5.8+48

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:        # Material/Cupertino localizations + RTL (i18n)
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2                 # talks to the KukLabs cloud (tRPC over HTTP)
  shared_preferences: ^2.3.2   # persist non-sensitive prefs (active company, theme, layout)
  flutter_secure_storage: ^9.2.2  # Keystore-backed storage for the session token (qa-audit SEC-001)
  intl: ^0.20.2                # date/time formatting for reminders (pinned by flutter_localizations)
  image_picker: ^1.2.2         # pick / capture images for image notes + OCR
  # file_picker 8.x hardcodes its own Android compileSdk to 34, which fails the
  # AAR-metadata gate on Flutter 3.44.4 (compileSdk 36). 10.3.3+ reads
  # flutter.compileSdkVersion dynamically; pin to >=10.3.10 (10.3.9 briefly removed
  # FilePicker.platform) and <11 (v11 dropped FilePicker.platform + withData).
  file_picker: ">=10.3.10 <11.0.0"   # attach arbitrary files to a note
  flutter_local_notifications: ^18.0.1  # OS reminder notifications (needs core-lib desugaring; injected in CI)
  timezone: ^0.9.4                      # schedule reminders at the correct instant
  flutter_timezone: ^5.1.0              # resolve the device IANA zone so tz.local is correct (else alarms fire at the wrong time)
  firebase_core: ^3.6.0                 # Firebase init (config from google-services.json)
  firebase_messaging: ^15.1.3           # FCM push (broadcast from Firebase console)
  firebase_crashlytics: ^4.1.3          # crash/error reporting (qa-audit: no monitoring was wired up)
  url_launcher: ^6.3.0                  # opens the Google sign-in page in the browser
  app_links: ^6.3.2                     # receives the kukkeep://auth deep link back
  cached_network_image: ^3.4.1          # disk-caches cover/attachment images (qa-audit BUG-008)
  app_settings: ^8.0.3                   # jump to system notification / battery-optimization settings (8.x targets compileSdk 34+)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.0   # generates the launcher icon from the KukLabs logo

# App launcher icon — generated from the KukLabs "K" mark (run in CI).
# Kept minimal (legacy square icons) for a reliable release build.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
